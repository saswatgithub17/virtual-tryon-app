name: virtual_tryon_app
description: Virtual Try-On E-Commerce Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  auto_route: ^10.3.0
  cached_network_image: ^3.3.0
  camera: ^0.10.5+9

  # UI Components
  cupertino_icons: ^1.0.6
  dart_mappable: ^4.6.1
  dio: ^5.4.0
  flutter:
    sdk: flutter

  # Loading & Dialogs
  flutter_riverpod: ^2.6.1
  flutter_spinkit: ^5.2.0

  # Payment
  flutter_stripe: ^10.1.1
  flutter_svg: ^2.0.9
  fluttertoast: ^8.2.4

  # Icons
  font_awesome_flutter: ^10.6.0
  google_fonts: ^6.1.0

  # HTTP & Networking
  http: ^1.1.2

  http_parser: any

  # Image Handling
  image_picker: ^1.0.7

  # Utils
  intl: ^0.19.0

  # State Management
  json_annotation: ^4.10.0
  provider: ^6.1.1

  # Local Storage
  riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0

  # PDF Viewer
  syncfusion_flutter_pdfviewer: ^24.1.41
  url_launcher: ^6.2.3
  uuid: ^4.3.3
dev_dependencies:
  auto_route_generator: ^10.2.3
  build_runner: ^2.5.4
  dart_mappable_builder: ^4.5.0
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.6.4

flutter:
  uses-material-design: true

  # Add assets
  assets:
    - assets/images/
    - assets/icons/
  # Uncomment to add fonts
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
